<!DOCTYPE html>
<!--
  Concept A — Minimal AI Assistant.
  Thesis: the magic is "press, look, hear" (MVP_DEFINITION.md). The display is an
  OPTIONAL one-line echo of an answer that is primarily spoken. Almost nothing on
  screen: a prompt, a thinking state, one wrapped answer line, done. This is the
  safest, most shippable concept and the closest to V1 reality.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sudonit · Concept A · Minimal Assistant</title>
<link rel="stylesheet" href="common.css">
</head>
<body>
<div class="eye">
  <div class="tag"><b>Concept A</b> · Minimal AI assistant</div>
  <a class="home" href="index.html">↩ all concepts</a>

  <div class="panel" id="panel">
    <div class="status">
      <span><span class="dot">●</span> SUDONIT</span>
      <span id="clock">--:--</span>
    </div>
    <div id="body">
      <div id="idle" class="dim">Ready. <span class="faint">Press to ask about what you see.</span></div>
      <div id="thinking" class="hidden"><span class="dim">Looking</span> <span class="cursor"></span></div>
      <div id="answer" class="hidden big"></div>
    </div>
  </div>

  <div class="controls">
    <kbd>Space</kbd> / <kbd>click</kbd> ask &nbsp;·&nbsp; <kbd>N</kbd> next sample &nbsp;·&nbsp; speech is the primary output; this line is the optional glance
  </div>
</div>

<script>
// A handful of canned "look and ask" answers. On real hardware these come from the
// phone (AI). Here they just demonstrate the UX states: idle → thinking → answer.
const SAMPLES = [
  "That plant is a snake plant — water it every 2–3 weeks.",
  "This sign says the museum closes at 18:00 today.",
  "The label lists peanuts — not safe for your allergy.",
  "That's a 1965 Vespa 150. Asking price looks fair.",
  "Bus 12 to Centrum leaves in 4 minutes from the right.",
];
let i = 0;

const idle = document.getElementById('idle');
const thinking = document.getElementById('thinking');
const answer = document.getElementById('answer');
const clock = document.getElementById('clock');

function tick(){ const d=new Date();
  clock.textContent = String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
tick(); setInterval(tick, 1000);

function show(el){ for (const e of [idle,thinking,answer]) e.classList.add('hidden'); el.classList.remove('hidden'); }

let busy = false;
function ask(){
  if (busy) return; busy = true;
  show(thinking);
  // Simulate phone round-trip latency (capture + AI). Real target: ~1–3 s.
  setTimeout(() => {
    const text = SAMPLES[i % SAMPLES.length];
    show(answer);
    typeOut(answer, text, () => {
      // Answer lingers, then the display returns to idle (audio already spoke it).
      setTimeout(() => { show(idle); busy = false; }, 3500);
    });
  }, 1400);
}

function typeOut(el, text, done){
  el.textContent = ''; let n = 0;
  const id = setInterval(() => {
    el.textContent = text.slice(0, ++n);
    if (n >= text.length){ clearInterval(id); done && done(); }
  }, 22);
}

function next(){ i++; if (!busy){ show(idle); } }

window.addEventListener('keydown', e => {
  if (e.code === 'Space'){ e.preventDefault(); ask(); }
  if (e.key.toLowerCase() === 'n'){ next(); }
});
document.getElementById('panel').addEventListener('click', ask);
</script>
</body>
</html>
